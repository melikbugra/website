persistence true
persistence_location /mosquitto/data/
log_dest stdout

# MQTT (TCP)
listener 1883
# MQTT over WebSocket (tarayıcı doğrudan bağlanmak isterse)
listener 9001
protocol websockets

# Geliştirme: anonim erişim açık. ÜRETİMDE kapat:
#   allow_anonymous false
#   password_file /mosquitto/config/passwd
# ve broker'ı yalnızca iç ağa / nginx proxy manager arkasına aç.
allow_anonymous true
