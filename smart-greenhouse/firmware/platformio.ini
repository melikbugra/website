; Akıllı Sera — ESP32 NodeMCU firmware
[env:esp32dev]
platform = espressif32@6.5.0      ; Arduino core 2.0.x (ledcSetup API ile uyumlu)
board = esp32dev
framework = arduino
monitor_speed = 115200
upload_speed = 921600

lib_deps =
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^7.2.0
    adafruit/Adafruit BME280 Library @ ^2.2.4
    adafruit/Adafruit Unified Sensor @ ^1.1.14
    claws/BH1750 @ ^1.3.0
    ; Opsiyonel toprak sıcaklığı (DS18B20):
    milesburton/DallasTemperature @ ^3.11.0
    paulstoffregen/OneWire @ ^2.3.8

; OTA yükleme için (ilk yükleme USB'den, sonrakiler kablosuz):
;   upload_protocol = espota
;   upload_port = greenhouse.local   ; veya ESP32 IP'si
