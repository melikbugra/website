version: '3.8'

services:
  main-page:
    build: .
    image: main_page:latest
    container_name: main_page
    restart: unless-stopped
    volumes:
      - .:/usr/share/nginx/html
    networks:
      - web
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.mainpage.rule=Host(`melikbugraozcelik.com`)"
      - "traefik.http.routers.mainpage.entrypoints=websecure"
      - "traefik.http.routers.mainpage.tls.certresolver=le"
      - "traefik.http.routers.mainpage.middlewares=hsts@file"
      - "traefik.http.services.mainpage.loadbalancer.server.port=80"

networks:
  web:
    external: true
    name: traefik-proxy
